name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugin/package-lock.json

      - name: Install plugin dependencies
        working-directory: plugin
        run: npm ci

      - name: Build plugin
        working-directory: plugin
        run: npm run build

      - name: Check version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          plugin_manifest_version="$(node -p "require('./plugin/manifest.json').version")"
          test "$tag" = "$manifest_version"
          test "$tag" = "$plugin_manifest_version"

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p release
          cp plugin/main.js release/main.js
          cp plugin/styles.css release/styles.css
          cp manifest.json release/manifest.json
          notes_file="release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_file" ]; then
            cp "$notes_file" release/RELEASE_NOTES.md
          else
            {
              echo "DocFerry ${GITHUB_REF_NAME}"
              echo
              echo "This release includes the bundled Obsidian plugin assets required for installation: main.js, manifest.json, and styles.css."
              echo
              echo "See CHANGELOG.md in the repository for the full version history."
            } > release/RELEASE_NOTES.md
          fi

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            release/main.js
            release/manifest.json
            release/styles.css

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release/RELEASE_NOTES.md
          files: |
            release/main.js
            release/manifest.json
            release/styles.css
